<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#F4EDE2">

<title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.description | truncate: 80, '' }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<meta property="og:title" content="{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — Harm reduction for nights out{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="website">
<meta property="og:image" content="{{ '/assets/img/pace-icon.png' | relative_url }}">
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" type="image/png" href="{{ '/assets/img/pace-icon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/img/pace-icon.png' | relative_url }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800;9..144,900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
